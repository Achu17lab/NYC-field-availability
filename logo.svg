<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <!-- Silver metallic ring gradients -->
    <linearGradient id="rg" x1="20%" y1="5%" x2="80%" y2="95%">
      <stop offset="0%"   stop-color="#f4f4f4"/>
      <stop offset="25%"  stop-color="#d4d4d4"/>
      <stop offset="55%"  stop-color="#a8a8a8"/>
      <stop offset="80%"  stop-color="#cccccc"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <linearGradient id="rm" x1="20%" y1="5%" x2="80%" y2="95%">
      <stop offset="0%"   stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#dcdcdc"/>
    </linearGradient>
    <clipPath id="c">
      <circle cx="100" cy="100" r="83"/>
    </clipPath>
  </defs>

  <!-- Metallic ring — three concentric circles -->
  <circle cx="100" cy="100" r="99" fill="url(#rg)"/>
  <circle cx="100" cy="100" r="89" fill="url(#rm)"/>
  <circle cx="100" cy="100" r="83" fill="white"/>

  <!-- Thin navy inner border for depth -->
  <circle cx="100" cy="100" r="83" fill="none" stroke="#1a2560" stroke-width="1.5"/>

  <!-- SD monogram — bold red, centered in upper zone -->
  <text x="100" y="100"
        text-anchor="middle"
        font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
        font-size="72" font-weight="900" fill="#d42b2b" letter-spacing="4">SD</text>

  <!-- Red underline accent -->
  <rect x="44" y="106" width="112" height="5" rx="2" fill="#d42b2b" clip-path="url(#c)"/>

  <!-- SPORTS -->
  <text x="100" y="143"
        text-anchor="middle"
        font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
        font-size="21" font-weight="900" fill="#1a2560" letter-spacing="3">SPORTS</text>

  <!-- DAY -->
  <text x="100" y="170"
        text-anchor="middle"
        font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
        font-size="24" font-weight="900" fill="#1a2560" letter-spacing="7">DAY</text>
</svg>
